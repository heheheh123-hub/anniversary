height:120px;

}

.envelope.glow{

0 0 30px #ff4d6d,
0 0 70px #ff758f,

}
.flap{
position:absolute;

left:0;

border-right:90px solid transparent;
border-top:70px solid #ff758f;
transform-origin:top;
transition:1s;
}

.paper{
position:absolute;
left:25px;
top:20px;
width:130px;
height:90px;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
transition:1.5s;
z-index:2;
}

.open .flap{
transform:rotateX(180deg);
}

.open .paper{
transform:translateY(-100px);
}

.fadeOut{

@keyframes fadeOut{
    from{

    to{
        opacity:0;
    }

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#3a0a22);
color:white;

}

#stars{

    width:100%;
    height:100%;
    z-index:-1;
    pointer-events:none;
}

section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:40px;
text-align:center;
}

h1{
font-size:60px;
margin-bottom:20px;
}

p{
max-width:800px;
font-size:18px;
line-height:1.8;
}

#title{
text-shadow:0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
}

#title::after{
content:"|";
animation:blink 0.7s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.hearts span{
position:fixed;
bottom:-50px;
font-size:30px;
animation:floatHearts 8s infinite linear;
opacity:0.8;
}

.hearts span:nth-child(1){
left:10%;
animation-delay:0s;
}

.hearts span:nth-child(2){
left:20%;
animation-delay:2s;
}

.hearts span:nth-child(3){
left:80%;
animation-delay:1s;
}

.hearts span:nth-child(4){
left:90%;
animation-delay:3s;
}

.hearts span:nth-child(5){
left:70%;
animation-delay:5s;
}

.hearts span:nth-child(6){
left:30%;
animation-delay:4s;
}

@keyframes floatHearts{
from{
transform:translateY(0);
}
to{
transform:translateY(-110vh);
}
}

#noBtn{
position:relative;
transition:0.2s;
}
#welcome{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1000;

}

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.letterIcon{
font-size:100px;
animation:shake 2s infinite, glow 2s infinite alternate;
}

@keyframes shake{

0%,100%{
transform:rotate(0deg);
}

25%{
transform:rotate(5deg);
}

75%{
transform:rotate(-5deg);
}

}

@keyframes glow{

from{
text-shadow:0 0 10px #ff4d6d;
}

to{
text-shadow:0 0 40px #ff4d6d;
}

}

.chapter{
display:none;
opacity:0;
}

.chapter.show{
display:block;
animation:appear 0.8s ease forwards;
}
@keyframes appear{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

#darkOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
z-index:50;
transition:1s;
}

#darkOverlay.show{
opacity:0.7;
}


.flyAway{
animation:flyAway 1.5s forwards;
}


@keyframes flyAway{

0%{
transform:translateY(0) scale(1);

}

50%{
transform:translateY(-150px) scale(1.4);
opacity:1;
}

100%{
transform:translateY(-500px) scale(0.3);
opacity:0;
}

}

.foldAway{

animation:foldAway 1s forwards;
transform-origin:top center;
perspective:1000px;

}


@keyframes foldAway{

0%{
transform:rotateX(0deg);
opacity:1;
}

50%{
transform:rotateX(45deg);
opacity:0.7;

100%{
transform:rotateX(90deg);

85%{

100%{

}

typeTitle();

    text1: "Hey fruity, the following 4 chapters are another snippet for you showing how much I love you. I don't think I'll ever be able to explain to you just how much I love you. Every single time I try to put it into words, it feels like I'm only explaining the tiniest part of what I actually feel because no paragraph, no website, nothing can fully show you how much you mean to me. no sentence could ever truly represent everything that's in my heart. You've become such a huge part of my life that I honestly can't remember what it felt like before you were in it. It's not even just that I love talking to you—it's that you've become the first person I think about when literally anything happens. If something funny happens, you're the first person I want to tell because I want to hear your laugh. If something good happens, you're the first person I want celebrating with me because your happiness makes my happiness even bigger. If something goes wrong, somehow just hearing your voice or seeing your name pop up makes everything feel lighter. You don't even realise how much comfort you've brought into my life just by being yourself. I don't think you'll ever fully understand the impact you've had on me, but you've genuinely changed the way I look at life, and I thank Allah every day for bringing you into it.",

    text3: "Wallahi, I don't think you'll ever understand how much the smallest things you do affect me. Every notification from you instantly changes my mood; like I will have the baddest migraine ever, and a notification from 'Wifey' would genuinely make me feel 50x better. I'll literally stop whatever I'm doing just to reply because in my head there's nothing more important than talking to you. Hearing your voice on call is genuinely one of my favourite things ever. Your laugh, your little shrieks when we're playing games, the way you randomly start telling me stories about your day, the way you get excited over the smallest things—I could honestly listen to that forever and never get bored. Like yesterday, when I was doing the house tour, the energy we had was so calming I felt so much better. I still remember us playing that fighting simulator and you shouting at me to dodge, or the time where we played the eyes and body obby game and your borderline ragebaited me.  To anyone else that's just some games, but to me it's one of those memories I'll probably still laugh about years from now because it was with you. That's what you've done to me—you've made ordinary moments feel unforgettable simply because you're in them. Im not even messing, everything we have talked about is imprinted in my mind, and I don't make hollow promises which means anything and everything you've said to me I am getting you it, even that pink diamond ring",
    text4: "I know people say we're young and they'll probably say things like 'it's just a teenage relationship' or 'you'll move on,' but I genuinely don't see you as someone who's only meant to be a chapter in my life. When I picture my future, you're naturally there. I picture telling you about my day after work, annoying you for attention while you're trying to do something, laughing over the dumbest things, travelling together, growing older together, and ofcourse making you throb. I know life won't always be perfect. We'll disagree sometimes, we'll have hard days, we'll both make mistakes because that's what being human is. But none of that changes how I feel. Loving you isn't something I wake up and decide to do every morning—it's become part of who I am. If someone asked me to describe home, I don't think I'd describe a place anymore. I'd describe the feeling I get whenever I'm talking to you. You are genuinely the greatest blessing Allah has ever placed in my life, and if He gave me the chance to live a thousand different lives, I'd spend every single one praying that somehow they'd all lead me back to you. I love you more than you'll probably ever realise, and I think a thousand paragraphs still wouldn't be enough to explain even half of it. I really really love you meri pyaari jaan, my cutie baby ❤️",

function typeMessage(id){

const element = document.getElementById(id);
    const text = messages[id];

    const button = element.parentElement.querySelector("button");
    if(button) button.style.display = "none";

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){
            element.innerHTML += text.charAt(i);

            i++;
            setTimeout(typing,30);
        }else{
            if(button) button.style.display = "inline-block";
        }

    }

    typing();
}

function yesLove(){

const music = document.getElementById("music");

if(!audioStarted){
    setupVisualizer();
}

music.volume = 0.3;

if(!audioStarted){
    setupVisualizer();
}

music.play().catch(()=>{});
const welcome = document.getElementById("welcome");

welcome.classList.add("fadeOut");

setTimeout(()=>{

welcome.style.display="none";

document.getElementById("letter").scrollIntoView({
behavior:"smooth"
});

},800);

}
function moveNo(){

let button=document.getElementById("noBtn");

let x = Math.random() * 300 - 150;
let y = Math.random() * 150 - 75;

button.style.transform=`translate(${x}px,${y}px)`;

}
let opened = false;

function openLetter(){

    if(opened) return;
    opened=true;

    const envelope=document.querySelector(".envelope");
    const overlay=document.getElementById("darkOverlay");
    const paper=document.querySelector(".paper");
envelope.classList.add("glow");

overlay.classList.add("show");

    setTimeout(()=>{
        envelope.classList.add("open");
    },500);


    setTimeout(()=>{
        paper.classList.add("flyAway");
    },1500);


  setTimeout(()=>{

document.getElementById("envelope").style.display="none";

overlay.classList.remove("show");

const firstChapter = document.getElementById("chapter1");
firstChapter.classList.add("show");

typeMessage("text1");

},3500);

}

function nextChapter(number){

const current = document.querySelector(".chapter.show");

if(current){

    current.classList.remove("show");
    current.classList.add("foldAway");

    setTimeout(()=>{

        current.style.display="none";
        current.classList.remove("foldAway");

        const next=document.getElementById("chapter"+number);

        next.classList.add("show");

        typeMessage("text"+number);

    },1000);

}

} 

let endingStarted = false;

function finalMessage(){

    if (endingStarted) return;
    endingStarted = true;

    const current = [...document.querySelectorAll(".chapter")]
        .find(chapter => chapter.classList.contains("show"));

    if(current){

        current.classList.add("fadeOut");

        setTimeout(()=>{

            current.style.display="none";
            current.classList.remove("fadeOut");

            startMovieEnding();

         setTimeout(()=>{

document.getElementById("foreverFinal").style.opacity="1";

typeMessage("text5");

},9000);
            for(let i=0;i<25;i++){

            }

        },800);

    }

}

ending.style.display="block";

const me = document.getElementById("mePic");
const together = document.getElementById("togetherPic");

setTimeout(()=>{

setTimeout(()=>{
    me.style.right="25%";

function createHeart(){

    const heart=document.createElement("span");

    heart.innerHTML="❤️";

    heart.style.position="fixed";

    heart.style.top="100vh";
    heart.style.fontSize=(20+Math.random()*25)+"px";
    heart.style.pointerEvents="none";
    heart.style.transition="6s linear";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.style.transform="translateY(-120vh)";
        heart.style.opacity="0";

    setTimeout(()=>{
        heart.remove();

    source.connect(analyser);
    analyser.connect(audioContext.destination);

    const buffer=new Uint8Array(analyser.frequencyBinCount);

    function animate(){

        analyser.getByteFrequencyData(buffer);

        bars.forEach((bar,index)=>{

            const start=index*8;
            const end=start+8;

            let sum=0;

            for(let i=start;i<end;i++){

                sum+=buffer[i];

            }

            const avg=sum/8;

            const height=Math.max(8,avg*0.55);

            bar.style.height=height+"px";

        });

        requestAnimationFrame(animate);

    }

    animate();

    audioStarted=true;

}

    }

        music.pause();
    }

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

const stars = [];

for(let i=0;i<180;i++){
    stars.push({

        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,

vx:(Math.random()-0.5)*0.35,
vy:(Math.random()-0.5)*0.35,

        r:Math.random()*2+1

    });

}

let connect = false;
let universeBoost = 0;

function shootingStar(){

    const star = document.createElement("div");

    star.style.position = "fixed";
    star.style.top = "-100px";
    star.style.left = (Math.random()*60+20) + "vw";

    star.style.width = "3px";
    star.style.height = "3px";

    star.style.background = "white";
    star.style.borderRadius = "50%";

    star.style.boxShadow =
        "0 0 20px white, 0 0 40px #ff7ea5";

    star.style.zIndex = "9999";
    star.style.pointerEvents = "none";

    document.body.appendChild(star);

    let x = 0;
    let y = 0;

    const interval = setInterval(()=>{

        x += 18;
        y += 12;

        star.style.transform = `translate(${x}px, ${y}px)`;

        star.style.boxShadow =
            `-${x/2}px ${y/2}px 25px rgba(255,255,255,.8),
             0 0 25px #ff7ea5`;

    },16);

    setTimeout(()=>{

        clearInterval(interval);
        star.remove();

    },900);

}

function animateStars(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(universeBoost > 0){
        universeBoost *= 0.992;
    }

    for(const s of stars){

        s.x += s.vx * (1 + universeBoost * 3);
        s.y += s.vy * (1 + universeBoost * 3);

        if(s.x < 0 || s.x > canvas.width) s.vx *= -1;
        if(s.y < 0 || s.y > canvas.height) s.vy *= -1;

        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r + universeBoost*1.5,0,Math.PI*2);

ctx.fillStyle = `rgba(
    255,
    255,
    255,
    ${0.8 + universeBoost*0.2}
)`;

     const glow = 0.6 + Math.sin(Date.now()/600 + s.x) * 0.4;

ctx.shadowBlur = 10 * glow;
ctx.shadowColor = "white";
        ctx.fill();
    }

// Always draw constellation
for(let i=0;i<stars.length;i++){

    for(let j=i+1;j<stars.length;j++){

        const dx = stars[i].x-stars[j].x;
        const dy = stars[i].y-stars[j].y;

        const dist = Math.sqrt(dx*dx+dy*dy);

        if(dist<150){

            ctx.beginPath();
            ctx.moveTo(stars[i].x,stars[i].y);
            ctx.lineTo(stars[j].x,stars[j].y);

            ctx.strokeStyle=`rgba(255,77,109,${0.08+universeBoost*0.35})`;

            ctx.lineWidth=0.8+universeBoost;

            ctx.stroke();

        }

    }

}

    requestAnimationFrame(animateStars);

}

    universeBoost = 1;

    },5000);

}
