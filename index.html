<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>

<style>
html{
    scroll-behavior:smooth;
}
.envelope{
width:180px;
height:120px;
background:#ff4d6d;
position:relative;
margin:30px auto;
border-radius:10px;
cursor:pointer;
transition:1s;
}

.flap{
position:absolute;
top:0;
left:0;
border-left:90px solid transparent;
border-right:90px solid transparent;
border-top:70px solid #ff758f;
transform-origin:top;
transition:1s;
}

.paper{
position:absolute;
left:25px;
top:20px;
width:130px;
height:90px;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
transition:1s;
}

.open .flap{
transform:rotateX(180deg);
}

.open .paper{
transform:translateY(-100px);
}

.fadeOut{
    animation:fadeOut 0.8s forwards;
}

@keyframes fadeOut{
    from{
        opacity:1;
    }

    to{
        opacity:0;
    }
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(135deg,#0f0f0f,#3a0a22);
color:white;
overflow-x:hidden;
}

section{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:40px;
text-align:center;
}

h1{
font-size:60px;
margin-bottom:20px;
}

p{
max-width:800px;
font-size:22px;
line-height:1.8;
}

#title{
text-shadow:0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
}

#title::after{
content:"|";
animation:blink 0.7s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.fade{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.fade.show{
opacity:1;
transform:translateY(0);
}

.hearts span{
position:fixed;
bottom:-50px;
font-size:30px;
animation:floatHearts 8s infinite linear;
opacity:0.8;
}

.hearts span:nth-child(1){
left:10%;
animation-delay:0s;
}

.hearts span:nth-child(2){
left:20%;
animation-delay:2s;
}

.hearts span:nth-child(3){
left:80%;
animation-delay:1s;
}

.hearts span:nth-child(4){
left:90%;
animation-delay:3s;
}

.hearts span:nth-child(5){
left:70%;
animation-delay:5s;
}

.hearts span:nth-child(6){
left:30%;
animation-delay:4s;
}

@keyframes floatHearts{
from{
transform:translateY(0);
}
to{
transform:translateY(-110vh);
}
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
font-size:25px;
opacity:0.4;
animation:moveStars 20s linear infinite;
pointer-events:none;
}

@keyframes moveStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-100vh);
}
}

#noBtn{
position:relative;
transition:0.2s;
}
#welcome{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
z-index:1000;
background:linear-gradient(135deg,#0f0f0f,#3a0a22);
}
#letter{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.letterIcon{
font-size:100px;
animation:shake 2s infinite, glow 2s infinite alternate;
}

@keyframes shake{

0%,100%{
transform:rotate(0deg);
}

25%{
transform:rotate(5deg);
}

75%{
transform:rotate(-5deg);
}

}

@keyframes glow{

from{
text-shadow:0 0 10px #ff4d6d;
}

to{
text-shadow:0 0 40px #ff4d6d;
}

}

.chapter{
display:none;
opacity:1;
animation:appear 0.8s ease;
}
@keyframes appear{

from{
opacity:0;
transform:translateY(50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>
<div class="stars">
⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐ ⭐
</div>

<div class="hearts">
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
<span>❤️</span>
</div>

<section id="welcome">

<h1 id="title"></h1>

<p>
I made this little website just for you ❤️
</p>

<h2>Do you love me? 🥺</h2>

<div>
<button onclick="yesLove()">Yes ❤️</button>
<button id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">No 💔</button></div>

</section>

<section id="letter">

<div id="envelope">

<div class="envelope" onclick="openLetter()">
    <div class="flap"></div>
    <div class="paper">💌</div>
</div>

<h2>A little letter for you...</h2>

<p>
I made this just for you ❤️
</p>

<button onclick="openLetter()">
Open My Heart ❤️
</button>

</div>

<div id="chapter1" class="chapter">

<h1>Chapter 1 ✨</h1>

<p id="text1"></p>

<button onclick="nextChapter(2)">
Continue ❤️
</button>

</div>

<div id="chapter2" class="chapter">

<h1>Chapter 2 ❤️</h1>

<p id="text2"></p>

<button onclick="nextChapter(3)">
Continue ❤️
</button>

</div>

<div id="chapter3" class="chapter">

<h1>Chapter 3 🌹</h1>

<p id="text3"></p>

<button onclick="nextChapter(4)">
Continue ❤️
</button>

</div>

<div id="chapter4" class="chapter">

<h1>Chapter 4 💍</h1>

<p id="text4"></p>

<button onclick="finalMessage()">
One Last Thing ❤️
</button>

</div>

<div id="final" class="chapter">

<h1>Forever & Always ❤️</h1>

<p id="text5"></p>

</div>
</section>

<script>


const text = "Happy Anniversary Meri Jaan❤️";
let i = 0;

function typeTitle() {
    if (i < text.length) {
        document.getElementById("title").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeTitle, 100);
    }
}

typeTitle();
const messages = {
    text1: "YOUR FIRST PARAGRAPH HERE",
    text2: "YOUR SECOND PARAGRAPH HERE",
    text3: "YOUR THIRD PARAGRAPH HERE",
    text4: "YOUR FOURTH PARAGRAPH HERE",
    text5: "No matter how much time passes, I will always choose you. Thank you for being mine ❤️"
};

function typeMessage(id){

const element = document.getElementById(id);
    const text = messages[id];

    const button = element.parentElement.querySelector("button");
    if(button) button.style.display = "none";

    element.innerHTML = "";

    let i = 0;

    function typing(){

        if(i < text.length){
            element.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing,30);
        }else{
            if(button) button.style.display = "inline-block";
        }

    }

    typing();
}

function yesLove(){

    const welcome = document.getElementById("welcome");

    welcome.classList.add("fadeOut");

    setTimeout(() => {
        welcome.remove();
    }, 800);

}
function moveNo(){

let button=document.getElementById("noBtn");

let x = Math.random() * 300 - 150;
let y = Math.random() * 150 - 75;

button.style.transform=`translate(${x}px,${y}px)`;

}
let opened = false;

function openLetter(){

    if(opened) return;
    opened = true;

    const envelope=document.querySelector(".envelope");

    envelope.classList.add("open");

    setTimeout(()=>{

        document.getElementById("envelope").style.display="none";

        document.getElementById("chapter1").style.display="block";
        typeMessage("text1");

    },1200);
}

function nextChapter(number){

const current = [...document.querySelectorAll(".chapter")]
    .find(chapter => chapter.style.display === "block");
if(current){

    current.classList.add("fadeOut");

    setTimeout(()=>{

        current.style.display="none";
        current.classList.remove("fadeOut");

        const next=document.getElementById("chapter"+number);
        next.style.display="block";
        typeMessage("text"+number);

    },800);

}

}

function finalMessage(){

const current = [...document.querySelectorAll(".chapter")]
    .find(chapter => chapter.style.display === "block");

current.classList.add("fadeOut");

setTimeout(()=>{

current.style.display="none";
current.classList.remove("fadeOut");

document.getElementById("final").style.display="block";
typeMessage("text5");
for(let i=0;i<25;i++){
    setTimeout(createHeart,i*200);
}
},800);

}

function createHeart(){

    const heart=document.createElement("span");

    heart.innerHTML="❤️";

    heart.style.position="fixed";
    heart.style.left=Math.random()*100+"vw";
    heart.style.top="100vh";
    heart.style.fontSize=(20+Math.random()*25)+"px";
    heart.style.pointerEvents="none";
    heart.style.transition="6s linear";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.style.transform="translateY(-120vh)";
        heart.style.opacity="0";
    },50);

    setTimeout(()=>{
        heart.remove();
    },6000);

}
</script>


</body>
</html>
